name: "Phase 0: Jira Discovery"

on:
  workflow_dispatch:
    inputs:
      project_key:
        description: 'Jira Project Key to audit (e.g., SCRUM, PROJ)'
        required: true
        type: string
        default: 'SCRUM'

jobs:
  audit-jira:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit project-policy.yaml back to the repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Discovery Script
        env:
          JIRA_SERVER_URL: ${{ secrets.JIRA_SERVER_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PROJECT_KEY: ${{ github.event.inputs.project_key }}
        run: |
          python src/tools/jira_mcp_client.py

      - name: Commit Policy Document
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add project-policy.yaml
          git commit -m "chore: generated Jira project policy [skip ci]" || echo "No changes to commit"
          git push
