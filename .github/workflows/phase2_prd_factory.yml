name: "Phase 2: PRD Factory & HITL"

on:
  pull_request:
    paths:
      - 'prds/**/*.md'
  issue_comment:
    types: [created]

jobs:
  # Job 1: When a PR with a PRD is opened/updated, generate backlog
  generate_backlog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PM Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python src/agents/pm_agent.py --pr ${{ github.event.pull_request.number }}

  # Job 2: When someone comments /approve on the draft issue, resume and push to Jira
  resume_and_push_to_jira:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resume Architect Agent & Push to Jira
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JIRA_SERVER_URL: ${{ secrets.JIRA_SERVER_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: SCRUM
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python src/agents/architect_agent.py --resume ${{ github.event.issue.number }}
