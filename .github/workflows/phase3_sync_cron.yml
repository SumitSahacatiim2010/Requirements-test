name: "Phase 3: Jira-GitHub Sync Cron"

on:
  schedule:
    - cron: '0 * * * *' # Executes at minute 0 past every hour
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout traceability database
        uses: actions/checkout@v4
        with:
          ref: traceability-store-db
          path: db

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: main
        run: pip install -r requirements.txt

      - name: Run Background Synchronization
        working-directory: main
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.APP_PRIVATE_KEY || secrets.GITHUB_TOKEN }}
        run: |
          python src/agents/sync_agent.py --db-path ../db/traceability.json
          
      - name: Commit Traceability Store Updates
        working-directory: db
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add traceability.json
          git commit -m "chore: update Jira linkages [skip ci]" || echo "No changes to commit"
          git push
